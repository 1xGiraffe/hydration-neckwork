services:
  clickhouse:
    build:
      context: ./clickhouse
      dockerfile: Dockerfile
    container_name: preis-clickhouse
    ports:
      - "18123:8123"
      - "19000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      - CLICKHOUSE_DB=price_data
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      - CLICKHOUSE_PASSWORD=dev
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - preis

  indexer:
    build: .
    container_name: preis-indexer
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      - RPC_URL=${RPC_URL:-wss://hydration.dotters.network}
      - CLICKHOUSE_HOST=http://clickhouse:8123
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-dev}
      - RPC_RATE_LIMIT=${INDEXER_RPC_RATE_LIMIT:-100}
      - BATCH_SIZE=${INDEXER_BATCH_SIZE:-10000}
    networks:
      - preis

  raw-indexer:
    build: .
    container_name: preis-raw-indexer
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      - RPC_URL=${RPC_URL:-wss://hydration.dotters.network}
      - CLICKHOUSE_HOST=http://clickhouse:8123
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-dev}
      - RPC_RATE_LIMIT=${RAW_RPC_RATE_LIMIT:-200}
      - BATCH_SIZE=${RAW_BATCH_SIZE:-10000}
      - RAW_ASSET_SNAPSHOT_INTERVAL=${RAW_ASSET_SNAPSHOT_INTERVAL:-1000}
      - RAW_PIPELINE_ID=${RAW_PIPELINE_ID:-raw-main}
    command: ["src/raw/cli.ts"]
    networks:
      - preis

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: preis-api
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - CLICKHOUSE_HOST=http://clickhouse:8123
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-dev}
    networks:
      - preis

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: preis-ui
    depends_on:
      - api
    ports:
      - "5173:80"
    networks:
      - preis

volumes:
  clickhouse_data:

networks:
  preis:
    driver: bridge
