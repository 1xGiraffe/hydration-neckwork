server {
    listen 80;
    root /usr/share/nginx/html;

    resolver 127.0.0.11 valid=10s ipv6=off;
    # Use the unique container name, NOT the compose service alias `api`: a
    # co-located project on the shared `common` docker network also runs a
    # service named `api`, so `api:3000` round-robins between the two containers
    # (~50% of requests hit the wrong one -> 404). The container_name is unique.
    set $api_upstream hydration-neckwork-api:3000;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        application/javascript
        application/json
        application/manifest+json
        application/xml
        image/svg+xml
        text/css
        text/plain;

    # Vite's generated assets are content-hashed and safe to cache immutably.
    location ^~ /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location ^~ /fonts/ {
        # Font filenames are stable, so allow release updates to replace them.
        add_header Cache-Control "public, max-age=2592000" always;
        try_files $uri =404;
    }

    # A missing static resource must be a real 404, never the SPA document.
    location ~* \.(?:avif|css|eot|gif|html|ico|jpe?g|js|json|map|mp4|otf|pdf|png|svg|ttf|txt|webm|webmanifest|webp|woff2?|xml)$ {
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files /index.html =404;
    }

    location ^~ /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
