# Shared micro-cache for API GETs. All /explorer responses are anonymous and the
# API stamps them with `public, max-age=…` (which nginx honors for entry
# lifetime), so N concurrent clients polling the same endpoint collapse to at
# most one upstream request per TTL — the API/ClickHouse load stays O(1) in the
# number of viewers even before the API's own in-process cache kicks in.
proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:10m max_size=200m inactive=15m use_temp_path=off;

server {
    listen 80;
    resolver 127.0.0.11 valid=10s ipv6=off;
    # Use the unique container name, NOT the compose service alias `api`: a
    # co-located project on the shared `common` docker network also runs a
    # service named `api`, so `api:3000` round-robins between the two containers
    # (~50% of requests hit the wrong one -> 404). The container_name is unique.
    set $api_upstream hydration-neckwork-api:3000;

    root /usr/share/nginx/html;
    index index.html;

    # Baseline browser hardening. The app intentionally permits inline styles
    # and its tiny inline theme/bootstrap scripts; all executable/data fetches
    # remain restricted to this origin, while account/token images may use HTTPS.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; manifest-src 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Compress the SPA bundle and any API JSON the upstream didn't compress.
    gzip on;
    gzip_comp_level 6;
    gzip_static on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;

    # History (clean-path) routing: a hard GET to /activity, /account/x, /asset/43,
    # etc. has no file on disk, so fall back to index.html. The bundled SPA router
    # then reads window.location.pathname and renders the matching page.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Always revalidate the SPA shell. It contains the current content-hashed
    # chunk names and must not outlive a container replacement.
    location = /index.html {
        expires -1;
        try_files $uri =404;
    }

    # The SPA has an `/assets` page route, but Vite also emits its bundles into a
    # physical `assets/` dir. Without this, a hard GET to `/assets` matches the
    # directory and nginx 301-redirects to `/assets/` — dropping the original port
    # (-> http://localhost/assets/, broken). An exact-match location is evaluated
    # before that directory-redirect logic, so serve the SPA shell directly.
    location = /assets {
        try_files /index.html =404;
    }

    # Vite emits content-hashed asset filenames, so they're safe to cache forever.
    location ^~ /assets/ {
        try_files $uri =404;
        expires max;
    }

    # Fonts keep stable names across a release and are the largest first-load
    # assets after JavaScript. Cache them without letting missing files fall
    # through to the SPA shell as text/html.
    location ^~ /fonts/ {
        try_files $uri =404;
        expires 30d;
    }

    # Icon probes must never fall through to the SPA shell: Safari requests
    # /favicon.ico (and apple-touch-icon variants) directly, and a 200
    # text/html answer gets cached as a permanently broken icon. Missing
    # icon => real 404.
    location ~ ^/(favicon\.ico|apple-touch-icon(-precomposed)?\.png)$ {
        try_files $uri =404;
    }

    # A typo in a static URL must be a real 404, not the SPA shell with the wrong
    # MIME type. Extensionless paths continue through the history fallback.
    location ~* \.(?:css|js|mjs|map|json|webmanifest|woff2?|png|jpe?g|gif|svg|ico)$ {
        try_files $uri =404;
        expires 7d;
    }

    location ^~ /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Buffering is required for the cache. (If SSE is ever added, give it its
        # own location with `proxy_buffering off` and no cache.)
        proxy_cache api_cache;
        proxy_cache_methods GET HEAD;
        # The read-only API emits Access-Control-Allow-Origin: *, so every
        # origin can safely share the same cached representation.
        proxy_cache_key "$request_uri";
        # Collapse concurrent misses into ONE upstream fetch; meanwhile (and on
        # upstream errors) serve the previous entry instead of stampeding.
        proxy_cache_lock on;
        proxy_cache_lock_timeout 65s;
        proxy_cache_use_stale updating error timeout;
        proxy_cache_background_update on;
        proxy_cache_revalidate on;
        add_header X-Cache-Status $upstream_cache_status;
        proxy_read_timeout 3600s;
    }
}
